name: Build Windows

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install dependencies
        run: npm ci

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v__VERSION__
          releaseName: PriceDB v__VERSION__
          releaseBody: |
            ## 下载
            - **PriceDB.zip** — 绿色版，解压即运行
            - **PriceDB_x64-setup.exe** — NSIS 安装包
          releaseDraft: true
          prerelease: false

      - name: Create portable zip
        shell: pwsh
        run: |
          Compress-Archive -Path src-tauri/target/release/price-db.exe -DestinationPath PriceDB.zip

      - name: Upload portable zip to release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          tag=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -n "$tag" ]; then
            gh release upload "$tag" PriceDB.zip --clobber
          fi
