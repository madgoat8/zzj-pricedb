name: Build Windows

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install dependencies
        run: npm ci

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v__VERSION__
          releaseName: PriceDB v__VERSION__
          releaseBody: "PriceDB 绿色版，解压即运行。数据库 app.db 自动创建在 exe 同目录。"
          releaseDraft: false
          prerelease: false

      - name: Create portable zip
        shell: pwsh
        run: |
          Compress-Archive -Path src-tauri/target/release/price-db.exe -DestinationPath PriceDB.zip

      - name: Upload portable zip and remove installer
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          VERSION=$(node -p "require('./src-tauri/tauri.conf.json').version")
          TAG="v${VERSION}"
          gh release upload "$TAG" PriceDB.zip --clobber
          # Remove installer assets, keep only portable zip
          for asset in $(gh release view "$TAG" --json assets -q '.assets[].name' | grep -v 'PriceDB.zip'); do
            gh release delete-asset "$TAG" "$asset" -y || true
          done
